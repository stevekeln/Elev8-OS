name: Problem library entry
description: Record a real operational problem before designing a solution
title: "[Problem]: "
labels: ["problem"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What real-world problem is Elev8 Arts experiencing?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it matters
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: Current workaround
  - type: textarea
    id: effects
    attributes:
      label: Problems caused by the workaround
  - type: textarea
    id: ideal
    attributes:
      label: Ideal outcome
    validations:
      required: true
  - type: dropdown
    id: who
    attributes:
      label: Who is affected?
      multiple: true
      options:
        - Owner
        - Manager
        - Artist
        - Customer
        - Bookkeeper
        - Staff
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
        - Someday
    validations:
      required: true
